
<html>
  <head>
    <meta charset="utf-8" />
    <!--script src="https://cdn.jsdelivr.net/npm/pdf-lib-plus-encrypt@1.0.28/dist/pdf-lib-plus-encrypt.min.js"></script-->
    <!--script src="https://unpkg.com/pdf-lib-plus-encrypt@1.0.8" type=module></script-->
    <script src="./pdf-lib-plus-encrypt.js"></script>

    
    <script src="https://unpkg.com/downloadjs@1.4.7"></script>
  </head>

  <body>
    <p>Clicks the buttonsss to create a new PDF document with <code>pdf-lib</code></p>
    <button onclick="createPdf()">Create PDF</button>
    <p class="small">(Your browser will download the resulting file)</p>
  </body>

  <script>
    const { PDFDocument, StandardFonts, rgb } = PDFLib;

    async function createPdf() {
    
      // Create a new PDFDocument
      const pdfDoc = await PDFDocument.create();
      
      /*
      // misc
       pdfDoc.setTitle('🥚 The Life of an Egg 🍳');
      pdfDoc.setAuthor('Humpty Dumpty');
      pdfDoc.setSubject('📘 An Epic Tale of Woe 📖');
      pdfDoc.setKeywords(['eggs', 'wall', 'fall', 'king', 'horses', 'men']);
      pdfDoc.setProducer('PDF App 9000 🤖');
      pdfDoc.setCreator('PDF App 9000 🤖');
      pdfDoc.setCreationDate(new Date('2018-06-24T01:58:37.228Z'));
      pdfDoc.setModificationDate(new Date('2018-12-21T07:00:11.000Z'));
*/

      // Embed the Times Roman font
      const timesRomanFont = await pdfDoc.embedFont(StandardFonts.TimesRoman);

      // Add a blank page to the document
      const page = pdfDoc.addPage();

      // Get the width and height of the page
      const { width, height } = page.getSize();

      // Draw a string of text toward the top of the page
      const fontSize = 30;
      page.drawText('Creating PDFs in JavaScript is awesome!', {
        x: 50,
        y: height - 4 * fontSize,
        size: fontSize,
        font: timesRomanFont,
        color: rgb(0, 0.53, 0.71),
      });
      
      
      //////////////
      //debugger;
      await pdfDoc.encrypt({
        userPassword: 'abcd',
        permissions: { modifying: true },
      });


     // useObjectStreams true and false works
     // note on the following section on bugs on adobe acrobat reader
      const pdfBytes = await pdfDoc.save({ useObjectStreams: false });

			// Trigger the browser to download the PDF document
      download(pdfBytes, "pdfexample.pdf", "application/pdf");
    }
  </script>
</html>
